name: calculator
description: "Evaluate a basic math expression, e.g. 2 + 2 * 10"
version: 1.0.0

input_schema:
  type: object
  properties:
    expression:
      type: string
      description: "A basic arithmetic expression to evaluate, e.g. 2 + 2 * 10"
  required:
    - expression

output_schema:
  type: object
  properties:
    result:
      type: string
      description: The numeric result of the expression, or an error message if evaluation failed

implementation:
  type: script
  script: calculator.py
  runtime: python3
  timeout: 30

annotations:
  requires_confirmation: false
  read_only: true
  idempotent: true
  cost: low
