name: word-count
description: Count the number of words in a text string.
version: 1.0.0

input_schema:
  type: object
  properties:
    text:
      type: string
      description: The text string whose words should be counted
  required:
    - text

output_schema:
  type: object
  properties:
    result:
      type: string
      description: The number of words in the text, as a string

implementation:
  type: script
  script: word-count.py
  runtime: python3
  timeout: 30

annotations:
  requires_confirmation: false
  read_only: true
  idempotent: true
  cost: low
