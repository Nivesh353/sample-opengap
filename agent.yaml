spec_version: 0.1.0
name: single-agent-langraph
version: 1.0.0
description: >-
  A helpful general-purpose assistant that evaluates math expressions and counts words using a ReAct-style tool-calling
  loop.
model:
  preferred: openai:gpt-4o
  fallback:
    - openai:gpt-4o-mini
  constraints:
    temperature: 0
tools:
  - calculator
  - word-count
skills:
  - react-tool-calling
runtime:
  max_turns: 50
  timeout: 300
