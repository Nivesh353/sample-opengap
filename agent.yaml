spec_version: "0.1.0"
name: ai-research-assistant
version: 1.0.0
description: Multi-agent research assistant that gathers information, analyzes findings, and produces comprehensive reports on any topic

model:
  preferred: openai:gpt-4o
  fallback:
    - anthropic:claude-sonnet-4-6
  constraints:
    temperature: 0.2
    max_tokens: 8192

runtime:
  max_turns: 50
  timeout: 600

skills:
  - orchestrate

tools:
  - web-search
  - file-read
  - file-write
